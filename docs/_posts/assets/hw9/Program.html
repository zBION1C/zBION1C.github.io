<hmtl>
<body>	
<script src="Simulator.js"></script>
<script src="Rectangle.js"></script>
<script src="Histogram.js"></script>
<script>
	const canvas = document.createElement("canvas")
	document.body.appendChild(canvas)
	const context = canvas.getContext("2d")
	context.canvas.width = 8000
	context.canvas.height = 8000

	var trials = 200
	var intervals = 900

	// Standard Normal variate using Box-Muller transform.
	function gaussianRandom(mean=0, stdev=1) {
	    const u = 1 - Math.random(); // Converting [0,1) to (0,1]
	    const v = Math.random();
	    const z = Math.sqrt( -2.0 * Math.log( u ) ) * Math.cos( 2.0 * Math.PI * v );
	    // Transform to the desired mean and standard deviation:
	    return z * stdev + mean;
	}

	function ABM (x,n) {	
		return (gaussianRandom(0, 1))
	}

	function GBM (x,n) {
		var mu = 2
		var sigma = 1
		return (mu*Math.sqrt(1/n) + sigma*gaussianRandom(0, 1))
	}

	function OU (x,n) {		
		var theta = 2
		var sigma = 1
		var mu = 2
		return (-theta*(mu-x)*Math.sqrt(1/n) + sigma*gaussianRandom(0, 1))
	}

	const s1 = new Simulator(context, 10, 10 , intervals, trials, ABM)
	s1.simulate()

	const s2 = new Simulator(context, 910, 10, intervals, trials, GBM) 
	s2.simulate()

	const s3 = new Simulator(context, 10, 610, intervals, trials, OU) 
	s3.simulate()

</script>
</body>
